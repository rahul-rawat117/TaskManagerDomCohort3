<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Explorer Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div>
            <h1>DOM <span class="explorer-word">Explorer</span></h1>
            <p>Manage your daily tasks </p>
        </div>

        <button id="themeToggle" class="theme-btn">
             Dark Mode
        </button>
    </header>

    <main class="container">

        <section class="card">
            <h2>Create New Task</h2>

            <form id="taskForm">

                <div class="form-group">
                    <label for="taskInput">Task Title</label>

                    <input
                        type="text"
                        id="taskInput"
                        placeholder="Enter task title"
                    >
                    <!-- div  -->
                </div>

                <div class="form-group">
                    <label for="category">Category</label>

                    <select id="category">
                        <option value="">Select Category</option>
                        <option value="Study">Study</option>
                        <option value="Work">Work</option>
                        <option value="Personal">Personal</option>
                    </select>
                </div>

                <button type="submit" class="add-btn">
                    + Add Task
                </button>

            </form>
        </section>

        <section class="card">

            <div class="task-header">
                <h2>My Tasks</h2>
                <span class="task-count">0 Tasks</span>
            </div>

            <div id="taskContainer">

                <div class="empty-state">
                    <h3>No Tasks Yet</h3>
                    <p>Add your first task to get started.</p>
                </div>

                <!-- Example Task Card -->

                <!--
                <div class="task-card">

                    <div class="task-content">
                        <h3>Learn DOM Manipulation</h3>

                        <span class="badge study">
                            Study
                        </span>
                    </div>

                    <div class="task-actions">

                        <button class="edit-btn">
                            Edit
                        </button>

                        <button class="complete-btn">
                            Complete
                        </button>

                        <button class="delete-btn">
                            Delete
                        </button>

                    </div>

                </div>
                -->

            </div>

        </section>

    </main>
<script src="script.js"></script>
</body>
</html>
